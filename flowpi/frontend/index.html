<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowPi Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-orb orb-a" aria-hidden="true"></div>
<div class="bg-orb orb-b" aria-hidden="true"></div>

<main class="layout dashboard-layout">
    <header class="hero card">
        <div>
            <p class="kicker">FlowPi Monitor</p>
            <h1>Flow Dashboard</h1>
            <p class="lead">Realtime tap status, active user, and consumption insights.</p>
            <div class="hero-links">
                <a class="admin-nav-link active" href="index.html" aria-current="page">Dashboard</a>
                <a class="admin-nav-link" href="stats.html">Statistics</a>
                <a class="admin-nav-link secondary" href="admin.html">Admin</a>
            </div>
        </div>
        <div id="apiStatus" class="pill" aria-live="polite">Connecting...</div>
    </header>

    <section class="metrics-grid" aria-label="Flow metrics">
        <article class="card metric-card">
            <h2>Tap Status</h2>
            <div id="tapStatus" class="metric-value">...</div>
        </article>

        <article class="card metric-card">
            <h2>Active User</h2>
            <div id="activeUser" class="metric-value">...</div>
        </article>

        <article class="card metric-card">
            <h2>Current Flow</h2>
            <div id="flowSpeed" class="metric-value">0.00 L/min</div>
            <div id="flowSpeedLs" class="metric-sub">0.00 L/s</div>
        </article>

        <article class="card metric-card">
            <h2>Total Volume</h2>
            <div id="user_total" class="metric-value">...</div>
        </article>
    </section>

    <section class="card leaderboard" aria-label="User totals">
        <div class="leaderboard-head">
            <h2>Total Volume per User</h2>
            <div class="sort-controls" id="sortControls" role="group" aria-label="Sort users">
                <button id="sortRankingBtn" class="sort-btn" type="button">Ranking</button>
                <button id="sortNameBtn" class="sort-btn" type="button">Name</button>
            </div>
        </div>
        <div id="user_totals" class="user-grid"></div>
    </section>

    <section class="card tap-history" aria-label="Recent tap sessions">
        <div class="leaderboard-head">
            <h2>Recent Taps (Open/Close)</h2>
        </div>
        <div id="tapSessions" class="tap-sessions"></div>
    </section>
</main>

<script src="app.js"></script>

</body>
</html>
