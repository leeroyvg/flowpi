<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowPi Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Flow Dashboard</h1>

<div class="card">
    <h2>Tap Status</h2>
    <div id="tapStatus">...</div>
    <div id="apiStatus" class="meta">Connecting...</div>
</div>

<div class="card">
    <h2>Active User</h2>
    <div id="activeUser">...</div>
</div>

<div class="card">
    <h2>Current Flow Speed</h2>
    <div id="flowSpeed">0.00 L/min</div>
    <div id="flowSpeedLs" class="meta">0.00 L/s</div>
</div>

<div class="card">
    <h2>Total Beer Volume</h2>
    <div id="user_total">...</div>
</div>

<div class="card">
    <h2>Total Beer Volume per User</h2>
    <div class="sort-controls" id="sortControls" role="group" aria-label="Sort users">
        <button id="sortRankingBtn" class="sort-btn" type="button">Ranking</button>
        <button id="sortNameBtn" class="sort-btn" type="button">Name</button>
    </div>
    <div id="user_totals" class="user-grid"></div>
</div>

<script src="app.js"></script>

</body>
</html>
