<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowPi Admin</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div class="bg-orb orb-a" aria-hidden="true"></div>
<div class="bg-orb orb-b" aria-hidden="true"></div>

<main class="layout admin-layout">
    <header class="hero card">
        <div>
            <p class="kicker">FlowPi Admin</p>
            <h1>Administration</h1>
            <p class="lead">Sign in to update per-user total volumes.</p>
            <div class="hero-links">
                <a class="admin-nav-link" href="index.html">Dashboard</a>
                <a class="admin-nav-link" href="stats.html">Statistics</a>
                <a class="admin-nav-link secondary active" href="admin.html" aria-current="page">Admin</a>
            </div>
        </div>
        <div id="adminStatus" class="pill" aria-live="polite">Checking session...</div>
    </header>

    <section id="loginCard" class="card admin-card" aria-label="Admin login">
        <h2>Admin Login</h2>
        <form id="loginForm" class="admin-form">
            <label for="adminUsername">Username</label>
            <input id="adminUsername" name="username" type="text" required autocomplete="username">

            <label for="adminPassword">Password</label>
            <input id="adminPassword" name="password" type="password" required autocomplete="current-password">

            <button id="loginBtn" type="submit">Sign In</button>
        </form>

        <div id="adminSessionCard" class="admin-session-card hidden" aria-live="polite">
            <p class="metric-sub">Signed in as admin.</p>
            <button id="logoutBtn" type="button">Sign Out</button>
        </div>
    </section>

    <section id="editorCard" class="admin-editor" aria-label="Volume editor">
        <div class="admin-editor-grid">
            <section class="card admin-panel-card admin-logs-section" aria-label="Flow event logs">
                <div class="leaderboard-head admin-logs-head">
                    <h2>Flow Event Logs</h2>
                    <div class="admin-logs-actions">
                        <button id="refreshLogsBtn" type="button">Refresh Logs</button>
                    </div>
                </div>

                <div class="admin-logs-wrap">
                    <table class="admin-logs-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Time</th>
                            <th>User</th>
                            <th>Event</th>
                            <th>Volume</th>
                        </tr>
                        </thead>
                        <tbody id="adminFlowLogsBody">
                        <tr>
                            <td colspan="5" class="metric-sub">No logs loaded yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="card admin-panel-card admin-users-section" aria-label="Manage users">
                <h2>Manage Users</h2>
                <form id="addUserForm" class="add-user-form">
                    <input id="newUserName" type="text" maxlength="40" placeholder="New user name" aria-label="New user name" required>
                    <button id="addUserBtn" type="submit">Add User</button>
                </form>
                <div id="adminUsers" class="admin-users"></div>
            </section>
        </div>
    </section>
</main>

<script src="admin.js?v=6"></script>
</body>
</html>
